<div class="d-flex justify-content-between mb-4 align-items-center flex-wrap gap-2">
  <div class="d-flex align-items-center">
    <h1 class="title">Contractors</h1>
    <a
      mat-mini-fab
      color="primary"
      [routerLink]="['add']"
      class="add-icon ms-3"
      matTooltip="Add Contractor"
    >
      <mat-icon>add</mat-icon>
    </a>
  </div>

  <app-filter
    [isPrimary]="true"
    [controls]="filterControls"
    [showAllOption]="true"
    (filterChanged)="onFilterChanged($event)"
  ></app-filter>
</div>

<div class="d-flex justify-content-end mb-3 gap-2 flex-wrap">
  <mat-form-field appearance="fill" class="export-field">
    <mat-label>Export Format</mat-label>
    <mat-select [(ngModel)]="selectedFormat">
      <mat-option *ngFor="let format of fileFormats" [value]="format.value">
        {{ format.label }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <button
    mat-raised-button
    color="primary"
    (click)="exportContractors()"
    [disabled]="!selectedFormat"
  >
    Export
  </button>
</div>

<app-adaptive-table
  [apiUrl]="endpoint"
  [httpMethod]="httpVerb"
  [filters]="filters"
  [columns]="columns"
  [isLoading]="false"
></app-adaptive-table>
