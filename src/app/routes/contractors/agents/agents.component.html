<div class="d-flex justify-content-between mb-4">
  <div>
    <div class="d-flex align-items-center">
      <h1 class="title">Agents</h1>
      <a
        mat-mini-fab
        color="primary"
        [routerLink]="['/contractors', contractorId, 'agents', 'add']"
        class="add-icon ms-3"
        matTooltip="Add Agent"
        matTooltipPosition="below"
      >
        <mat-icon>add</mat-icon>
      </a>
    </div>
    <div class="subtitle">
      <span>For contractor :</span>
      <span>{{ contractorName }}</span>
    </div>
  </div>
  <app-filter
    [isPrimary]="true"
    [controls]="filterControls"
    (filterChanged)="onFilterChanged($event)"
  ></app-filter>
</div>

<app-adaptive-table
  [apiUrl]="endpoint"
  [httpMethod]="httpVerb"
  [filters]="filters"
  [columns]="columns"
  [rowClassFormatter]="rowClassFormatter"
  [isLoading]="false"
>
  <ng-template #actionBtns let-row let-index="index" let-col="colDef">
    <a
      mat-icon-button
      color="primary"
      (click)="openViewDetailsDialog(row.id)"
      matTooltip="View Details"
    >
      <mat-icon color="primary"> visibility</mat-icon>
    </a>
    <button
      color="primary"
      mat-icon-button
      (click)="toggleAgentState(row)"
      [matTooltip]="row.isActive ? 'Disable Agent' : 'Enable Agent'"
    >
      <mat-icon color="primary">{{ row.isActive ? 'block' : 'check_circle' }}</mat-icon>
    </button>
    <a
      color="primary"
      mat-icon-button
      [routerLink]="['/contractors', contractorId, 'agents', 'edit', row.id]"
      matTooltip="Edit Agent"
    >
      <mat-icon color="primary">edit</mat-icon>
    </a>
  </ng-template>
</app-adaptive-table>
