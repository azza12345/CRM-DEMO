<div class="d-flex justify-content-between mb-4">
  <div class="d-flex align-items-center">
    <h1 class="title">Agents</h1>
    <a
      mat-mini-fab
      color="primary"
      [routerLink]="['contractors/agents/add-agent']"
      class="add-icon ms-3"
      matTooltip="Add Agent"
      matTooltipPosition="below"
    >
      <mat-icon>add</mat-icon>
    </a>
  </div>
  <app-filter
    [isPrimary]="true"
    [controls]="filterControls"
    (filterChanged)="onFilterChanged($event)"
  ></app-filter>
</div>

<app-adaptive-table
  [apiUrl]="endpoint"
  [httpMethod]="httpVerb"
  [filters]="filters"
  [columns]="columns"
  [rowClassFormatter]="rowClassFormatter"
  [isLoading]="false"
>
  <ng-template #actionBtns let-row let-index="index" let-col="colDef">
    <a mat-icon-button color="primary" (click)="viewDetails(row)" matTooltip="View Details">
      <mat-icon color="primary"> visibility</mat-icon>
    </a>
    <button
      color="primary"
      mat-icon-button
      (click)="toggleAgentState(row)"
      [matTooltip]="row.state === 'enabled' ? 'Disable Agent' : 'Enable Agent'"
    >
      <mat-icon color="primary">{{ row.state === 'enabled' ? 'block' : 'check_circle' }}</mat-icon>
    </button>
    <a color="primary" mat-icon-button (click)="editAgent(row)" matTooltip="Edit Agent">
      <mat-icon color="primary">edit</mat-icon>
    </a>
  </ng-template>
</app-adaptive-table>
