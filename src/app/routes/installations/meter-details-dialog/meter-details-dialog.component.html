<h2 class="title">{{ data.title }}</h2>
<hr class="top-separator" />
<div class="meter-details-container">
  @if (data.showTabs) {
    <mat-tab-group color="accent">
      <mat-tab label="Old Meter">
        <div class="tab-container border px-3">
          <div>
            <app-meter-info [details]="oldMeterDetails"></app-meter-info>
            <app-spare-parts-table [spareParts]="oldMeterSpareParts"> </app-spare-parts-table>
          </div>


          <div class="meter-image" *ngIf="data.oldMeter.image">
            <img [src]="getImageUrl(data.oldMeter.image)" alt="Old Meter Image" />
          </div>
        </div>
      </mat-tab>

      <mat-tab label="New Meter">
        <div class="tab-container border px-3">
          <div>
            <app-meter-info [details]="newMeterDetails"></app-meter-info>
            <app-spare-parts-table [spareParts]="newMeterSpareParts"> </app-spare-parts-table>
          </div>
          <div class="meter-image" *ngIf="data.newMeter.image">
            <img [src]="getImageUrl(data.newMeter.image)" alt="New Meter Image" />
          </div>
        </div>
      </mat-tab>
    </mat-tab-group>
  }

  @if (!data.showTabs) {
    <div class="tab-container border px-3">
      <div>
        <app-meter-info [details]="newMeterDetails"></app-meter-info>
        <app-spare-parts-table [spareParts]="newMeterSpareParts"> </app-spare-parts-table>
      </div>
      <div class="meter-image">
        <img [src]="data.newMeter.image" alt="new meter image" />
      </div>
    </div>
  }
</div>
