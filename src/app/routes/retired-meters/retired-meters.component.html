<div class="d-flex justify-content-between mb-4">
  <h1 class="title">Retired Meters</h1>
  <app-filter
    [isPrimary]="true"
    [controls]="filterControls"
    (filterChanged)="onFilterChanged($event)"
  ></app-filter>
</div>

<app-adaptive-table
  [apiUrl]="endpoint"
  [httpMethod]="httpVerb"
  [filters]="filters"
  [columns]="columns"
  [isLoading]="false"
></app-adaptive-table>
