<div class="d-flex w-full h-full login-container">
  <div class="logo mb-5">
    <img src="assets/images/svgs/Logo.svg" alt="Ghana Electrometer Logo" />
  </div>
  <mat-card class="login-box">
    <mat-card-header class="center-elem bg-primary">
      <mat-card-title>{{ 'login_title' | translate }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form class="form-field-full" [formGroup]="loginForm" autocomplete="off">
        <div class="form-field mb-3">
          <mat-form-field appearance="outline" hideRequiredMarker="true">
            <mat-label>{{ 'username' | translate }}</mat-label>
            <input type="text" matInput formControlName="username" autocomplete="off" />
            <mat-icon matPrefix>person_outline</mat-icon>
            @if (username.hasError('required')) {
              <mat-error>Username is required.</mat-error>
            }
          </mat-form-field>
        </div>
        <div class="form-field mb-3">
          <mat-form-field appearance="outline" hideRequiredMarker="true">
            <mat-label>{{ 'password' | translate }}</mat-label>
            <input type="password" matInput formControlName="password" autocomplete="new-password"  />
            <mat-icon matPrefix>lock_outline</mat-icon>
            @if (
              loginForm.get('password')?.hasError('required') && loginForm.get('password')?.touched
            ) {
              <mat-error>Password is required.</mat-error>
            }
          </mat-form-field>
        </div>

        <button
          class="w-full"
          mat-raised-button
          color="primary"
          [disabled]="!!loginForm.invalid"
          [loading]="isSubmitting"
          (click)="login()"
        >
          {{ 'login' | translate }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
