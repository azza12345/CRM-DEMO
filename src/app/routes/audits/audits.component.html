<div class="d-flex justify-content-between mb-4 align-items-center">
  <div class="d-flex align-items-center gap-3">
    <h1 class="title">Audits</h1>

    <mat-form-field appearance="outline" class="me-2" style="width: 150px;">
      <mat-label>Export As</mat-label>
      <mat-select [(value)]="selectedExportFormat">
        <mat-option *ngFor="let format of exportFormats" [value]="format.value">
          {{ format.label }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <button
      mat-raised-button
      color="primary"
      (click)="exportData()"
      [disabled]="!selectedExportFormat"
    >
      Export
    </button>
  </div>

  <app-filter
    [isPrimary]="true"
    [controls]="filterControls"
    [showAllOption]="true"
    (filterChanged)="onFilterChanged($event)"
  ></app-filter>
</div>

<app-adaptive-table
  [apiUrl]="endpoint"
  [httpMethod]="httpVerb"
  [filters]="filters"
  [columns]="columns"
  [isLoading]="false"
></app-adaptive-table>
